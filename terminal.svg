<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="280" viewBox="0 0 650 280" fill="none">
  <style>
    .bg { fill: #0d1117; rx: 8px; }
    .text { font-family: 'Fira Code', 'Courier New', monospace; font-size: 13px; }
    .user { fill: #58a6ff; font-weight: bold; }
    .command { fill: #ffffff; font-weight: normal; }
    .output { fill: #c9d1d9; }
    .quote { fill: #56e39f; font-style: italic; }

    /* Auto Light/Dark Mode handling */
    @media (prefers-color-scheme: light) {
      .bg { fill: #f6f8fa; stroke: #d0d7de; stroke-width: 1px; }
      .user { fill: #0969da; }
      .command { fill: #1f2328; }
      .output { fill: #24292f; }
      .quote { fill: #b02020; }
    }
  </style>

  <rect width="100%" height="280" class="bg"/>
  
  <g class="text" transform="translate(20, 35)">
    <text y="0">
      <tspan class="user">user@github:~$ </tspan>
      <tspan class="command">
        <animate attributeName="visibility" from="hidden" to="visible" begin="0.2s" fill="freeze"/>
        ./skills --verbose
      </tspan>
    </text>
    
    <text x="265" y="0" fill="#ffffff">
      <animate attributeName="opacity" values="1;0;1" dur="0.6s" repeatCount="indefinite" begin="0.2s"/>
      <animate attributeName="visibility" from="visible" to="hidden" begin="1.4s" fill="freeze"/>
      |
    </text>

    <g class="output">
      <animate attributeName="visibility" from="hidden" to="visible" begin="1.4s" fill="freeze"/>
      <text y="22">&gt; Languages:  [ Python (Internals), C++, SQL, Bash ]</text>
      <text y="40">&gt; Tools:      [ Git, VS Code, Vim ]</text>
      <text y="58">&gt; Core:       [ DSA, Math, Networking, OOPS ]</text>
    </g>
    
    <g>
      <animate attributeName="visibility" from="hidden" to="visible" begin="1.6s" fill="freeze"/>
      <text y="95">
        <tspan class="user">user@github:~$ </tspan>
        <tspan class="command">
          <animate attributeName="visibility" from="hidden" to="visible" begin="1.8s" fill="freeze"/>
          ./current_focus
        </tspan>
      </text>
    </g>
    
    <text x="235" y="95" fill="#ffffff">
      <animate attributeName="visibility" from="hidden" to="visible" begin="1.8s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0;1" dur="0.6s" repeatCount="indefinite" begin="1.8s"/>
      <animate attributeName="visibility" from="visible" to="hidden" begin="2.8s" fill="freeze"/>
      |
    </text>

    <g class="output">
      <animate attributeName="visibility" from="hidden" to="visible" begin="2.8s" fill="freeze"/>
      <text y="117">&gt; 1. Competitive Programming (DSA)</text>
      <text y="135">&gt; 2. AI &amp; Machine Learning</text>
      <text y="153">&gt; 3. Ethical Hacking &amp; Security</text>
    </g>
    
    <g>
      <animate attributeName="visibility" from="hidden" to="visible" begin="3.0s" fill="freeze"/>
      <text y="190">
        <tspan class="user">user@github:~$ </tspan>
        <tspan class="command">
          <animate attributeName="visibility" from="hidden" to="visible" begin="3.2s" fill="freeze"/>
          ./status
        </tspan>
      </text>
    </g>
    
    <text x="180" y="190" fill="#ffffff">
      <animate attributeName="visibility" from="hidden" to="visible" begin="3.2s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0;1" dur="0.6s" repeatCount="indefinite" begin="3.2s"/>
      |
    </text>

    <g class="quote">
      <animate attributeName="visibility" from="hidden" to="visible" begin="4.0s" fill="freeze"/>
      <text y="212">&gt; "Coding to understand, not just to execute."</text>
    </g>
  </g>
</svg>
