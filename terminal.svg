<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="280" viewBox="0 0 800 280" fill="none">
  <style>
    .bg { fill: #0d1117; rx: 8px; }
    .text { font-family: 'Fira Code', 'Courier New', monospace; font-size: 14px; }
    .user { fill: #58a6ff; font-weight: bold; }
    .command { fill: #ffffff; white-space: pre; }
    .output { fill: #c9d1d9; opacity: 0; }
    .quote { fill: #56e39f; font-style: italic; opacity: 0; }

    /* Typing (reveal) animations – each command types itself */
    .cmd1 { animation: type1 1.2s steps(16, end) forwards; }
    .cmd2 { animation: type2 1.0s steps(14, end) forwards 2.4s; }
    .cmd3 { animation: type3 0.6s steps(7, end) forwards 4.2s; }

    @keyframes type1 {
      0% { clip-path: inset(0 100% 0 0); }
      100% { clip-path: inset(0 0 0 0); }
    }
    @keyframes type2 {
      0% { clip-path: inset(0 100% 0 0); }
      100% { clip-path: inset(0 0 0 0); }
    }
    @keyframes type3 {
      0% { clip-path: inset(0 100% 0 0); }
      100% { clip-path: inset(0 0 0 0); }
    }

    /* Blinking cursor – independent of SMIL */
    .cursor {
      fill: #ffffff;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Fade in outputs after typing finishes */
    .out-skills { animation: fadeIn 0.2s forwards 1.4s; }
    .out-focus  { animation: fadeIn 0.2s forwards 3.4s; }
    .out-status { animation: fadeIn 0.2s forwards 4.8s; }
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* Light mode support */
    @media (prefers-color-scheme: light) {
      .bg { fill: #f6f8fa; stroke: #d0d7de; stroke-width: 1px; }
      .user { fill: #0969da; }
      .command { fill: #1f2328; }
      .output { fill: #24292f; }
      .quote { fill: #b02020; }
      .cursor { fill: #1f2328; }
    }
  </style>

  <rect width="100%" height="280" class="bg"/>

  <g class="text" transform="translate(25, 40)">
    <!-- Command 1 -->
    <g>
      <text y="0"><tspan class="user">user@github:~$ </tspan></text>
      <text y="0" class="command cmd1" x="126">./skills --verbose</text>
      <!-- Typing cursor (disappears after typing) -->
      <rect x="296" y="-13" width="2" height="15" class="cursor" style="animation: blink 0.6s step-end infinite; visibility: visible;">
        <animate attributeName="visibility" values="visible;hidden" keyTimes="0;1" dur="1.4s" fill="freeze"/>
      </rect>
    </g>

    <!-- Output 1 -->
    <g class="output out-skills">
      <text y="24">&gt; Languages:  [ Python (Internals), C++, SQL, Bash ]</text>
      <text y="44">&gt; Tools:      [ Git, VS Code, Vim ]</text>
      <text y="64">&gt; Core:       [ DSA, Math, Networking, OOPS ]</text>
    </g>

    <!-- Command 2 -->
    <g transform="translate(0, 100)">
      <text y="0"><tspan class="user">user@github:~$ </tspan></text>
      <text y="0" class="command cmd2" x="126">./current_focus</text>
      <rect x="271" y="-13" width="2" height="15" class="cursor" style="animation: blink 0.6s step-end infinite; visibility: visible;">
        <animate attributeName="visibility" values="visible;hidden" keyTimes="0;1" dur="1.2s" begin="2.4s" fill="freeze"/>
      </rect>
    </g>

    <!-- Output 2 -->
    <g class="output out-focus">
      <text y="124">&gt; 1. Competitive Programming (DSA)</text>
      <text y="144">&gt; 2. AI &amp; Machine Learning</text>
      <text y="164">&gt; 3. Ethical Hacking &amp; Security</text>
    </g>

    <!-- Command 3 -->
    <g transform="translate(0, 200)">
      <text y="0"><tspan class="user">user@github:~$ </tspan></text>
      <text y="0" class="command cmd3" x="126">./status</text>
      <!-- Permanent blinking cursor at end of last command -->
      <rect x="206" y="-13" width="2" height="15" class="cursor"/>
    </g>

    <!-- Quote output -->
    <g class="quote out-status">
      <text y="224">&gt; "Coding to understand, not just to execute."</text>
    </g>
  </g>
</svg>
