<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 1200 360" fill="none">
  <style>
    .bg { fill: #0d1117; }
    .text { font-family: 'Fira Code', 'Courier New', monospace; font-size: 18px; }
    .user { fill: #58a6ff; font-weight: bold; }
    .command { fill: #ffffff; white-space: pre; }
    .output { fill: #c9d1d9; opacity: 0; }
    .quote { fill: #56e39f; font-style: italic; opacity: 0; }

    /* Hide everything initially */
    .cmd-group, .out-group { opacity: 0; }

    /* Reveal and type each command sequentially */
    .cmd1 { animation: showCmd 0s forwards 0.2s, type1 1.2s steps(16, end) forwards 0.2s; }
    .out1 { animation: fadeIn 0.3s forwards 1.5s; }
    .cmd2 { animation: showCmd 0s forwards 2.8s, type2 1.0s steps(14, end) forwards 2.8s; }
    .out2 { animation: fadeIn 0.3s forwards 3.9s; }
    .cmd3 { animation: showCmd 0s forwards 5.2s, type3 0.6s steps(7, end) forwards 5.2s; }
    .out3 { animation: fadeIn 0.3s forwards 5.9s; }

    @keyframes showCmd {
      to { opacity: 1; }
    }
    @keyframes type1 {
      0% { clip-path: inset(0 100% 0 0); }
      100% { clip-path: inset(0 0 0 0); }
    }
    @keyframes type2 {
      0% { clip-path: inset(0 100% 0 0); }
      100% { clip-path: inset(0 0 0 0); }
    }
    @keyframes type3 {
      0% { clip-path: inset(0 100% 0 0); }
      100% { clip-path: inset(0 0 0 0); }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* Blinking cursor */
    .cursor {
      fill: #ffffff;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Hide cursor after typing finishes */
    .cursor1 { animation: blink 0.6s step-end infinite, hideCursor 0s forwards 1.5s; }
    .cursor2 { animation: blink 0.6s step-end infinite, hideCursor 0s forwards 3.9s; }
    .cursor3 { animation: blink 0.6s step-end infinite; } /* permanent */

    @keyframes hideCursor {
      to { visibility: hidden; }
    }

    /* Light mode */
    @media (prefers-color-scheme: light) {
      .bg { fill: #f6f8fa; }
      .user { fill: #0969da; }
      .command { fill: #1f2328; }
      .output { fill: #24292f; }
      .quote { fill: #b02020; }
      .cursor { fill: #1f2328; }
    }
  </style>

  <rect width="100%" height="100%" class="bg"/>

  <g class="text" transform="translate(30, 50)">
    <!-- COMMAND 1 -->
    <g class="cmd-group cmd1">
      <text y="0"><tspan class="user">user@github:~$ </tspan></text>
      <text y="0" class="command" x="150">./skills --verbose</text>
      <rect x="320" y="-14" width="2" height="18" class="cursor cursor1"/>
    </g>
    <g class="out-group out1">
      <text y="28">&gt; Languages:  [ Python (Internals), C++, SQL, Bash ]</text>
      <text y="52">&gt; Tools:      [ Git, VS Code, Vim ]</text>
      <text y="76">&gt; Core:       [ DSA, Math, Networking, OOPS ]</text>
    </g>

    <!-- COMMAND 2 -->
    <g class="cmd-group cmd2" transform="translate(0, 120)">
      <text y="0"><tspan class="user">user@github:~$ </tspan></text>
      <text y="0" class="command" x="150">./current_focus</text>
      <rect x="310" y="-14" width="2" height="18" class="cursor cursor2"/>
    </g>
    <g class="out-group out2">
      <text y="148">&gt; 1. Competitive Programming (DSA)</text>
      <text y="172">&gt; 2. AI &amp; Machine Learning</text>
      <text y="196">&gt; 3. Ethical Hacking &amp; Security</text>
    </g>

    <!-- COMMAND 3 -->
    <g class="cmd-group cmd3" transform="translate(0, 240)">
      <text y="0"><tspan class="user">user@github:~$ </tspan></text>
      <text y="0" class="command" x="150">./status</text>
      <rect x="245" y="-14" width="2" height="18" class="cursor cursor3"/>
    </g>
    <g class="out-group out3">
      <text y="268" class="quote">&gt; "Coding to understand, not just to execute."</text>
    </g>
  </g>
</svg>
