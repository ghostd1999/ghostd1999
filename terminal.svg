<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 1100 450" fill="none">
  <style>
    .bg { fill: #0d1117; }
    .text { font-family: 'Courier New', 'SF Mono', 'Fira Code', monospace; font-size: 18px; }
    .prompt { fill: #58a6ff; font-weight: bold; }
    .cmd-text { fill: #ffffff; }
    .output { fill: #c9d1d9; }
    .quote { fill: #56e39f; font-style: italic; }

    /* Sequential reveal of command blocks */
    .cmd1, .out1, .cmd2, .out2, .cmd3, .out3 { opacity: 0; }
    .cmd1 { animation: fadeIn 0.1s forwards 0.2s; }
    .cmd1 .type { animation: typing 1.2s steps(16) forwards 0.2s; }
    .out1 { animation: fadeIn 0.3s forwards 1.6s; }
    
    .cmd2 { animation: fadeIn 0.1s forwards 3.0s; }
    .cmd2 .type { animation: typing 1.0s steps(14) forwards 3.0s; }
    .out2 { animation: fadeIn 0.3s forwards 4.2s; }
    
    .cmd3 { animation: fadeIn 0.1s forwards 5.4s; }
    .cmd3 .type { animation: typing 0.7s steps(8) forwards 5.4s; }  /* 8 characters for "./status" */
    .out3 { animation: fadeIn 0.3s forwards 6.2s; }

    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes typing {
      0% { clip-path: inset(0 100% 0 0); }
      100% { clip-path: inset(0 0 0 0); }
    }

    /* Cursor movement and blink */
    .cursor {
      fill: #ffffff;
      animation: blink 1s step-end infinite;
    }
    .cursor1 {
      animation: blink 0.6s step-end infinite, moveCursor1 1.2s forwards 0.2s, hideCursor 0s forwards 1.6s;
    }
    .cursor2 {
      animation: blink 0.6s step-end infinite, moveCursor2 1.0s forwards 3.0s, hideCursor 0s forwards 4.2s;
    }
    .cursor3 {
      animation: blink 0.6s step-end infinite, moveCursor3 0.7s forwards 5.4s;
    }

    @keyframes moveCursor1 {
      0% { transform: translateX(0); }
      100% { transform: translateX(190px); }
    }
    @keyframes moveCursor2 {
      0% { transform: translateX(0); }
      100% { transform: translateX(180px); }
    }
    @keyframes moveCursor3 {
      0% { transform: translateX(0); }
      100% { transform: translateX(110px); }  /* "./status" is 8 chars, moves ~110px */
    }
    @keyframes hideCursor { to { visibility: hidden; } }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

    /* Light mode */
    @media (prefers-color-scheme: light) {
      .bg { fill: #f6f8fa; }
      .prompt { fill: #0969da; }
      .cmd-text { fill: #1f2328; }
      .output { fill: #24292f; }
      .quote { fill: #b02020; }
      .cursor { fill: #1f2328; }
    }
  </style>

  <rect width="100%" height="100%" class="bg" rx="0"/>

  <g class="text" transform="translate(25, 45)">
    <!-- COMMAND 1 -->
    <g class="cmd1">
      <text y="0"><tspan class="prompt">user@github:~$ </tspan></text>
      <text y="0" class="cmd-text type" x="170">./skills --verbose</text>
      <rect x="170" y="-13" width="2" height="20" class="cursor cursor1"/>
    </g>
    <g class="out1">
      <text y="30" class="output">&gt; Languages:  [ Python (Internals), C++, SQL, Bash ]</text>
      <text y="56" class="output">&gt; Tools:      [ Git, VS Code, Vim ]</text>
      <text y="82" class="output">&gt; Core:       [ DSA, Math, Networking, OOP ]</text>
    </g>

    <!-- COMMAND 2 -->
    <g class="cmd2" transform="translate(0, 140)">
      <text y="0"><tspan class="prompt">user@github:~$ </tspan></text>
      <text y="0" class="cmd-text type" x="170">./current_focus</text>
      <rect x="170" y="-13" width="2" height="20" class="cursor cursor2"/>
    </g>
    <g class="out2">
      <text y="170" class="output">&gt; 1. Competitive Programming (DSA)</text>
      <text y="196" class="output">&gt; 2. AI &amp; Machine Learning</text>
      <text y="222" class="output">&gt; 3. Ethical Hacking &amp; Security</text>
    </g>

    <!-- COMMAND 3 - fixed "./status" (was missing 's') -->
    <g class="cmd3" transform="translate(0, 280)">
      <text y="0"><tspan class="prompt">user@github:~$ </tspan></text>
      <text y="0" class="cmd-text type" x="170">./status</text>
      <rect x="170" y="-13" width="2" height="20" class="cursor cursor3"/>
    </g>
    <g class="out3">
      <text y="310" class="quote">&gt; "Coding to understand, not just to execute."</text>
    </g>
  </g>
</svg>
