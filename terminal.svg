<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="280" viewBox="0 0 800 280" fill="none">
  <style>
    .bg { fill: #0d1117; rx: 8px; }
    .text { font-family: 'Fira Code', 'Courier New', monospace; font-size: 14px; }
    .user { fill: #58a6ff; font-weight: bold; }
    .command { fill: #ffffff; font-weight: normal; }
    .output { fill: #c9d1d9; opacity: 0; animation: fadeIn 0.1s forwards; }
    .quote { fill: #56e39f; font-style: italic; opacity: 0; animation: fadeIn 0.1s forwards; }
    .cursor { fill: #ffffff; }

    /* Output reveal timing */
    .out-skills { animation-delay: 1.6s; }
    .out-focus { animation-delay: 3.6s; }
    .out-status { animation-delay: 5.0s; }

    /* Fade in animation for output */
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* Auto light/dark mode handling */
    @media (prefers-color-scheme: light) {
      .bg { fill: #f6f8fa; stroke: #d0d7de; stroke-width: 1px; }
      .user { fill: #0969da; }
      .command { fill: #1f2328; }
      .output { fill: #24292f; }
      .quote { fill: #b02020; }
      .cursor { fill: #1f2328; }
    }
  </style>

  <defs>
    <!-- Clip paths for typing effect (x = prompt width 126px) -->
    <clipPath id="clip-skills">
      <rect x="126" y="-15" height="20" width="0">
        <animate attributeName="width" from="0" to="170" dur="1.2s" begin="0.2s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0 0 1 1"/>
      </rect>
    </clipPath>
    <clipPath id="clip-focus">
      <rect x="126" y="-15" height="20" width="0">
        <animate attributeName="width" from="0" to="145" dur="1.0s" begin="2.6s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0 0 1 1"/>
      </rect>
    </clipPath>
    <clipPath id="clip-status">
      <rect x="126" y="-15" height="20" width="0">
        <animate attributeName="width" from="0" to="80" dur="0.6s" begin="4.4s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0 0 1 1"/>
      </rect>
    </clipPath>
  </defs>

  <rect width="100%" height="280" class="bg"/>
  
  <g class="text" transform="translate(25, 40)">
    
    <!-- ===== COMMAND 1: ./skills --verbose ===== -->
    <g>
      <!-- Prompt -->
      <text y="0">
        <tspan class="user">user@github:~$ </tspan>
      </text>
      <!-- Command text with typing clip -->
      <text y="0" class="command" clip-path="url(#clip-skills)" x="126">./skills --verbose</text>
      
      <!-- Typing cursor (moves from start to end of command, then hides) -->
      <rect x="126" y="-13" width="2" height="15" class="cursor">
        <animate attributeName="x" from="126" to="296" dur="1.2s" begin="0.2s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0 0 1 1"/>
        <animate attributeName="opacity" values="1;0;1" dur="0.6s" repeatCount="indefinite" begin="0.2s"/>
        <animate attributeName="visibility" from="visible" to="hidden" begin="1.6s" fill="freeze"/>
      </rect>
    </g>

    <!-- Output for command 1 -->
    <g class="output out-skills">
      <text y="24">&gt; Languages:  [ Python (Internals), C++, SQL, Bash ]</text>
      <text y="44">&gt; Tools:      [ Git, VS Code, Vim ]</text>
      <text y="64">&gt; Core:       [ DSA, Math, Networking, OOPS ]</text>
    </g>

    <!-- ===== COMMAND 2: ./current_focus ===== -->
    <g transform="translate(0, 100)">
      <!-- Prompt -->
      <text y="0">
        <tspan class="user">user@github:~$ </tspan>
      </text>
      <!-- Command text with typing clip -->
      <text y="0" class="command" clip-path="url(#clip-focus)" x="126">./current_focus</text>
      
      <!-- Typing cursor -->
      <rect x="126" y="-13" width="2" height="15" class="cursor">
        <animate attributeName="x" from="126" to="271" dur="1.0s" begin="2.6s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0 0 1 1"/>
        <animate attributeName="opacity" values="1;0;1" dur="0.6s" repeatCount="indefinite" begin="2.4s"/>
        <animate attributeName="visibility" from="visible" to="hidden" begin="3.6s" fill="freeze"/>
      </rect>
    </g>

    <!-- Output for command 2 -->
    <g class="output out-focus">
      <text y="124">&gt; 1. Competitive Programming (DSA)</text>
      <text y="144">&gt; 2. AI &amp; Machine Learning</text>
      <text y="164">&gt; 3. Ethical Hacking &amp; Security</text>
    </g>

    <!-- ===== COMMAND 3: ./status ===== -->
    <g transform="translate(0, 200)">
      <!-- Prompt -->
      <text y="0">
        <tspan class="user">user@github:~$ </tspan>
      </text>
      <!-- Command text with typing clip -->
      <text y="0" class="command" clip-path="url(#clip-status)" x="126">./status</text>
      
      <!-- Permanently blinking cursor (never hides) -->
      <rect x="126" y="-13" width="2" height="15" class="cursor">
        <animate attributeName="x" from="126" to="206" dur="0.6s" begin="4.4s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0 0 1 1"/>
        <animate attributeName="opacity" values="1;0;1" dur="0.6s" repeatCount="indefinite" begin="4.4s"/>
      </rect>
    </g>

    <!-- Quote output for command 3 -->
    <g class="quote out-status">
      <text y="224">&gt; "Coding to understand, not just to execute."</text>
    </g>

  </g>
</svg>
